<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Basketball Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 20px;
            padding: 20px;
            height: 95vh;
        }
        .player-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .player-table th, .player-table td { border: 1px solid #444; padding: 5px; text-align: center; }
        .btn-score { background: #28a745; width: 35px; }
        .btn-foul { background: #dc3545; width: 35px; }
        .btn-t { background: orange; color: black; }
        .active-team { border-left: 5px solid var(--gold); }
        #log-container { 
            background: #000; font-family: monospace; padding: 10px; 
            height: 200px; overflow-y: scroll; border: 1px solid #555;
        }
    </style>
</head>
<body class="admin-body">

<div class="admin-grid">
    
    <div class="card">
        <h3>🏠 Heim-Team</h3>
        <table class="player-table" id="table-home">
            <thead><tr><th>#</th><th>Name</th><th>Pkt</th><th>F</th><th>Aktion</th></tr></thead>
            <tbody id="players-home">
                </tbody>
        </table>
        <br>
        <button onclick="addPlayer('home')">+ Spieler hinzufügen</button>
        <hr>
        <h3>🚀 Gast-Team</h3>
        <table class="player-table" id="table-guest">
            <thead><tr><th>#</th><th>Name</th><th>Pkt</th><th>F</th><th>Aktion</th></tr></thead>
            <tbody id="players-guest"></tbody>
        </table>
        <button onclick="addPlayer('guest')">+ Spieler hinzufügen</button>
    </div>

    <div class="card">
        <div style="text-align:center;">
            <h2>SPIELSTEUERUNG</h2>
            <div style="display:flex; justify-content: space-around; font-size: 2em;">
                <div>HEIM: <span id="display-home">0</span></div>
                <div><input type="text" id="clock-input" value="10:00" style="width:80px; text-align:center;"></div>
                <div>GAST: <span id="display-guest">0</span></div>
            </div>
        </div>
        <hr>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="card">
                <h4>Popups & Unterbrechungen</h4>
                <button onclick="triggerPopup('TIMEOUT', '60s Auszeit läuft...', 60000)">Auszeit (60s)</button>
                <button onclick="triggerPopup('TECHNISCHE PAUSE', 'Das Spiel ist kurz unterbrochen', 0)">Techn. Pause</button>
                <button onclick="bc.postMessage({type: 'HIDE_POPUP'})" class="danger">Popup Schließen</button>
                <hr>
                <button onclick="triggerPopup('HALBZEIT', 'Präsentiert von Kleins Backstube', 0)">Halbzeit-Modus</button>
            </div>
            <div class="card">
                <h4>Besondere Vorfälle</h4>
                <input type="text" id="special-player" placeholder="Spieler Name/Nr">
                <button class="btn-t" onclick="triggerSpecial('T-FOUL')">Technisches Foul</button>
                <button class="danger" onclick="triggerSpecial('EJECTION')">Platzverweis (Ejection)</button>
                <button onclick="triggerPopup('SPIELENDE', 'Der Sieger steht fest!', 0)" style="background:gold; color:black;">Winner Popup</button>
            </div>
        </div>
        <hr>
        <h4>Sponsoren Einblendung</h4>
        <button onclick="sendSponsor('Kleins Backstube')">Kleins Backstube</button>
        <button onclick="sendSponsor('Falc Immobilien')">Falc Immobilien</button>
    </div>

    <div class="card">
        <h3>Protokoll (Live)</h3>
        <div id="log-container"></div>
        <br>
        <button onclick="downloadPDF()" style="background: #007bff; width: 100%; padding: 15px;">💾 Spielbericht (PDF) generieren</button>
        <p style="font-size: 11px; color: #888; margin-top: 10px;">
            Hinweis: Alle Aktionen werden hier geloggt und im PDF gespeichert.
        </p>
    </div>
</div>

<script>
    const bc = new BroadcastChannel('basket_stream');
    let game = {
        home: { score: 0, players: [{nr: "7", name: "Müller", pts: 0, fouls: 0}] },
        guest: { score: 0, players: [{nr: "12", name: "Schmidt", pts: 0, fouls: 0}] },
        logs: []
    };

    // Spieler-Listen initialisieren
    function renderPlayers() {
        ['home', 'guest'].forEach(side => {
            const container = document.getElementById(`players-${side}`);
            container.innerHTML = "";
            game[side].players.forEach((p, index) => {
                container.innerHTML += `
                    <tr>
                        <td>${p.nr}</td>
                        <td>${p.name}</td>
                        <td>${p.pts}</td>
                        <td>${p.fouls}</td>
                        <td>
                            <button class="btn-score" onclick="addPoint('${side}', ${index})">+</button>
                            <button class="btn-foul" onclick="addFoul('${side}', ${index})">F</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function addPoint(side, idx) {
        game[side].players[idx].pts += 2; // Standard +2
        game[side].score += 2;
        logAction(`Punkt für ${game[side].players[idx].name} (${side})`);
        updateOverlay();
    }

    function addFoul(side, idx) {
        game[side].players[idx].fouls++;
        const p = game[side].players[idx];
        logAction(`FOUL an ${p.name} (${side}) - Gesamt: ${p.fouls}`);
        if(p.fouls >= 5) alert(`${p.name} hat 5 Fouls!`);
        renderPlayers();
    }

    function logAction(msg) {
        const time = new Date().toLocaleTimeString();
        const entry = `${time}: ${msg}`;
        game.logs.push(entry);
        const div = document.createElement('div');
        div.style.color = "#0f0";
        div.innerText = entry;
        document.getElementById('log-container').prepend(div);
    }

    function updateOverlay() {
        document.getElementById('display-home').innerText = game.home.score;
        document.getElementById('display-guest').innerText = game.guest.score;
        bc.postMessage({
            type: 'UPDATE_SCORE',
            home: game.home.score,
            guest: game.guest.score
        });
        renderPlayers();
    }

    function triggerPopup(title, content, duration) {
        logAction(`Popup ausgelöst: ${title}`);
        bc.postMessage({ type: 'SHOW_POPUP', title, content, duration });
    }

    function triggerSpecial(type) {
        const name = document.getElementById('special-player').value || "Unbekannter Spieler";
        const title = type === 'EJECTION' ? '🛑 PLATZVERWEIS' : '⚠️ TECH. FOUL';
        triggerPopup(title, name, 8000);
        logAction(`${type} gegen ${name}`);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("OFFIZIELLER DBB-STYLE SPIELBERICHT", 10, 10);
        doc.text(`ENDSTAND: HEIM ${game.home.score} : ${game.guest.score} GAST`, 10, 25);
        let y = 40;
        game.logs.forEach(line => {
            doc.text(line, 10, y);
            y += 7;
        });
        doc.save("spielbericht.pdf");
    }

    function addPlayer(side) {
        const name = prompt("Name des Spielers?");
        const nr = prompt("Trikotnummer?");
        if(name && nr) {
            game[side].players.push({nr, name, pts: 0, fouls: 0});
            renderPlayers();
        }
    }

    // Initial Start
    renderPlayers();
</script>
</body>
</html>
